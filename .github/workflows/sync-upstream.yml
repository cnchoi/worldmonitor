name: Sync Upstream

on:
  schedule:
    - cron: '0 21 * * *'  # 每天 UTC 21点（北京时间次日5点）执行
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 拉取所有历史，确保能同步完整

      - name: Sync from Upstream
        run: |
          # 配置git用户信息（必须，否则push会失败）
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 添加上游仓库并拉取最新代码
          git remote add upstream https://github.com/koala73/worldmo || echo "Upstream remote already exists"
          git fetch upstream
          
          # 切换到主分支（根据你的仓库实际分支名修改，比如master）
          git checkout main
          
          # 合并上游主分支代码（使用--allow-unrelated-histories兼容首次同步）
          git merge upstream/main --allow-unrelated-histories -X theirs || echo "Merge failed (conflicts exist)"
          
          # 推送合并后的代码到当前仓库
          git push origin main
        env:
          # 显式指定GITHUB_TOKEN，确保push权限
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
