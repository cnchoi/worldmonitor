name: Sync Upstream

on:
  schedule:
    - cron: '0 21 * * *' # 매일 한국 시간 오전 6시
  workflow_dispatch:

# 이 섹션이 추가되어야 워크플로우 파일(.yml) 업데이트 에러를 막을 수 있습니다.
permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync from Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git remote add upstream https://github.com/koala73/worldmonitor.git
          git fetch upstream
          
          git checkout main
          # 원본 코드를 우선 병합하되 내 워크플로우 파일은 보존합니다.
          git merge upstream/main -X theirs --allow-unrelated-histories
          
          git push origin main
