name: Sync Upstream

on:
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 = 한국 시간(KST) 다음날 오전 06:00
  workflow_dispatch:      # 수동 실행 버튼 활성화

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync from Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 원본 저장소 등록 (worldmonitor 예시)
          git remote add upstream https://github.com/koala73/worldmonitor.git
          git fetch upstream
          
          # 내 main 브랜치로 이동
          git checkout main
          
          # 원본의 내용을 우선하되, 내 워크플로우 파일은 유지하는 병합 방식
          git merge upstream/main -X theirs --allow-unrelated-histories
          
          # 내 저장소로 푸시
          git push origin main
